<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout - MonoMuse</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../static/script.js" defer></script>
</head>
<body onload="addYear()">
    <div class="container">
        
        <header class="header">
            <img id="logo" src="../static/monomuselogo.png" alt="MonoMuse Museum Logo">
        </header>

        <nav class="nav_bar">
            <a href="../index.html">Home</a>
            <a href="explore.html">Explore</a>
            <a href="exhibitions.html">Exhibitions</a>
            <a class="cta" href="tickets.html">Buy Tickets</a>
        </nav>

        <main class="main">
            <h2>Checkout</h2>
            
            <form id="ticketForm" style="display: block; max-width: 500px; margin: 0 auto;" onsubmit="processPayment(event)">
                <label for="name">Name:</label><br>
                <input type="text" id="name" required><br>
                
                <label for="email">Email:</label><br>
                <input type="email" id="email" required><br>
                
                <label for="quantity">Number of Tickets:</label><br>
                <input type="number" id="quantity" min="1" required><br>
                
                <button type="submit" class="cta" style="width: 100%;">Complete Purchase</button>
            </form>
        </main>

        <footer class="footer">
            <p id="copyYear"></p>
        </footer>

    </div>
</body>
</html>
